<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">WLT - Traffic Policy</title>
<style>
  :root {
    /* Cyberpunk/High-Tech Theme */
    /* Neon Colors */
    --primary-neon: #00f0ff;      /* Bright cyan */
    --primary-neon-alt: #00d4ff;  /* Electric blue */
    --accent-neon: #ff00aa;       /* Magenta/pink for admin */
    --success-neon: #00ff88;       /* Neon green */
    --error-neon: #ff3366;         /* Neon red */
    --warning-neon: #ffaa00;       /* Neon orange */
    --info-neon: #00d4ff;         /* Electric blue */
    
    /* Base Colors */
    --bg: #0a0e17;                /* Deep dark blue */
    --surface: #0f1623;          /* Dark surface */
    --surface-elevated: #141c2b;  /* Elevated surface */
    --border: #1e293b;           /* Dark border */
    --border-light: #334155;      /* Lighter border */
    --border-glow: rgba(0, 240, 255, 0.5);
    
    /* Shadows and Glows */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.1);
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
    --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
    
    /* Typography */
    --heading-font: 'JetBrains Mono', 'Fira Code', 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
    --body-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    
    /* Text Colors */
    --text-primary: #e0e6ed;      /* Light gray */
    --text-secondary: #94a3b8;    /* Secondary gray */
    --text-muted: #64748b;        /* Muted gray */
    --text-light: #475569;        /* Light gray for muted */
    
    /* Spacing Scale (8px base) */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
    
    /* Border Radius */
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --radius-xl: 12px;
    
    /* Transitions */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Admin theme */
    --admin-border: #334155;
    --admin-surface: #1e293b;
    --admin-bg: #0f1623;
    
    /* Status Colors */
    --ok-bg: rgba(0, 255, 136, 0.1);
    --ok-text: #00ff88;
    --ok-border: rgba(0, 255, 136, 0.3);
    --err-bg: rgba(255, 51, 102, 0.1);
    --err-text: #ff3366;
    --err-border: rgba(255, 51, 102, 0.3);
    --info-bg: rgba(0, 212, 255, 0.1);
    --info-text: #00d4ff;
    --info-border: rgba(0, 212, 255, 0.3);
    
    /* Glow effects */
    --glow-primary: 0 0 20px rgba(0, 240, 255, 0.3), 0 0 40px rgba(0, 240, 255, 0.1);
    --glow-accent: 0 0 20px rgba(255, 0, 170, 0.3), 0 0 40px rgba(255, 0, 170, 0.1);
    --glow-success: 0 0 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(0, 255, 136, 0.1);
    --glow-error: 0 0 20px rgba(255, 51, 102, 0.3), 0 0 40px rgba(255, 51, 102, 0.1);
  }

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }
  
  html {
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  
  body {
    font-family: var(--body-font);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
    padding: var(--space-md);
    font-feature-settings: "kern" 1;
    font-variant-ligatures: common-ligatures;
    background-image: 
      linear-gradient(rgba(10, 14, 23, 0.95) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10, 14, 23, 0.95) 1px, transparent 1px);
    background-size: 50px 50px;
    position: relative;
  }
  
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at 20% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255, 0, 170, 0.02) 0%, transparent 50%),
      radial-gradient(circle at 40% 20%, rgba(0, 212, 255, 0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
  }
  
  h1 {
    font-family: var(--heading-font);
    text-align: center;
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: var(--space-lg);
    color: var(--text-primary);
    letter-spacing: -0.025em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--primary-neon) 0%, var(--accent-neon) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    margin-bottom: var(--space-md);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    transition: all var(--transition-normal);
    position: relative;
    backdrop-filter: blur(10px);
  }
  
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, 
      rgba(0, 240, 255, 0.1) 0%, 
      rgba(255, 0, 170, 0.05) 50%, 
      rgba(0, 240, 255, 0.1) 100%);
    opacity: 0;
    transition: opacity var(--transition-normal);
    border-radius: inherit;
    pointer-events: none;
  }
  
  .card:hover {
    border-color: var(--primary-neon);
    box-shadow: var(--glow-primary), var(--shadow-lg);
    transform: translateY(-2px);
  }
  
  .card:hover::before {
    opacity: 1;
  }
  
  .admin-card {
    border: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface-elevated) 0%, var(--admin-bg) 100%);
    box-shadow: var(--shadow-md);
    border-color: var(--accent-neon);
    position: relative;
  }
  
  .admin-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-neon), transparent);
    opacity: 0.8;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .card-tag {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 6px 12px;
    margin-bottom: var(--space-sm);
    font-size: 0.71rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: var(--heading-font);
    background: var(--border-light);
    color: var(--primary-neon);
    border: 1px solid var(--border-glow);
    box-shadow: var(--glow-primary);
  }
  
  .card-tag.self {
    background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(0, 212, 255, 0.1) 100%);
    color: var(--primary-neon);
    border: 1px solid var(--primary-neon);
    box-shadow: var(--glow-primary);
  }
  
  .card-tag.admin {
    background: linear-gradient(135deg, rgba(255, 0, 170, 0.1) 0%, rgba(255, 51, 102, 0.1) 100%);
    color: var(--accent-neon);
    border: 1px solid var(--accent-neon);
    box-shadow: var(--glow-accent);
  }

  .card-title {
    font-family: var(--heading-font);
    font-size: 1.125rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: var(--space-sm);
    letter-spacing: -0.025em;
  }
  
  .card-copy {
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: var(--space-md);
    font-weight: 400;
  }

  .card h2 {
    font-family: var(--heading-font);
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: var(--space-md);
    font-weight: 600;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-sm) 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.875rem;
  }
  
  .info-row:last-child { 
    border-bottom: none; 
  }
  
  .info-label { 
    color: var(--text-muted);
    font-weight: 500;
  }
  
  .info-value {
    font-family: var(--heading-font);
    font-size: 0.8rem;
    word-break: break-all;
    text-align: right;
    max-width: 60%;
    color: var(--primary-neon);
    font-weight: 600;
  }

  .policy-grid {
    display: grid;
    gap: var(--space-sm);
  }
  
  .policy-card {
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-md);
    cursor: pointer;
    transition: all var(--transition-normal);
    display: flex;
    align-items: center;
    gap: var(--space-md);
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  
  .policy-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, transparent 0%, rgba(0, 240, 255, 0.05) 100%);
    opacity: 0;
    transition: opacity var(--transition-normal);
    border-radius: inherit;
  }
  
  .policy-card:hover {
    border-color: var(--primary-neon);
    background: var(--surface-elevated);
    transform: translateY(-2px);
    box-shadow: var(--glow-primary), var(--shadow-md);
  }
  
  .policy-card:hover::before {
    opacity: 1;
  }
  
  .policy-card.active {
    border-color: var(--primary-neon);
    background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(0, 212, 255, 0.05) 100%);
    box-shadow: var(--glow-primary);
  }
  
  .policy-card.disabled {
    cursor: not-allowed;
    opacity: 0.6;
    transform: none;
  }
  
  .policy-card.disabled:hover {
    border-color: var(--border);
    background: var(--surface);
    transform: none;
    box-shadow: var(--shadow-sm);
  }

  .policy-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
    transition: all var(--transition-normal);
    box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.5);
  }
  
  .policy-card:not(.disabled) .policy-dot {
    background: linear-gradient(135deg, var(--primary-neon) 0%, var(--primary-neon-alt) 100%);
    box-shadow: var(--glow-primary);
    animation: pulse 2s infinite;
  }
  
  .policy-card.active .policy-dot {
    background: linear-gradient(135deg, var(--primary-neon-alt) 0%, var(--primary-neon) 100%);
    box-shadow: var(--glow-primary);
    animation: pulse 1.5s infinite;
  }
  
  .policy-card.disabled .policy-dot {
    background: var(--border);
    opacity: 0.5;
    box-shadow: none;
  }
  
  @keyframes pulse {
    0% { box-shadow: var(--glow-primary); }
    50% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.3), 0 0 20px rgba(0, 240, 255, 0.2); }
    100% { box-shadow: var(--glow-primary); }
  }

  .policy-info { flex: 1; }
  
  .policy-name { 
    font-weight: 600; 
    font-size: 0.95rem;
    color: var(--text-primary);
    font-family: var(--heading-font);
    text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
  }
  
  .policy-desc { 
    font-size: 0.8rem; 
    color: var(--text-muted); 
    margin-top: 4px;
    line-height: 1.4;
  }
  
  .policy-mark { 
    font-size: 0.75rem; 
    color: var(--text-muted); 
    font-family: var(--heading-font);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 500;
    border: 1px solid var(--border-glow);
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
  }

  .status {
    text-align: center;
    padding: var(--space-md);
    border-radius: var(--radius-md);
    font-size: 0.875rem;
    margin-bottom: var(--space-md);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    font-weight: 500;
    transition: all var(--transition-normal);
    border: 1px solid;
    position: relative;
  }
  
  .status.ok { 
    background: var(--ok-bg); 
    color: var(--ok-text);
    border-color: var(--ok-border);
    box-shadow: var(--glow-success);
  }
  
  .status.err { 
    background: var(--err-bg); 
    color: var(--err-text);
    border-color: var(--err-border);
    box-shadow: var(--glow-error);
  }
  
  .status.info { 
    background: var(--info-bg); 
    color: var(--info-text);
    border-color: var(--info-border);
    box-shadow: var(--glow-primary);
  }
  
  .inline-status {
    max-width: none;
    margin-left: 0;
    margin-right: 0;
  }

  .loading { 
    text-align: center; 
    color: var(--text-muted); 
    padding: var(--space-2xl);
    font-size: 0.875rem;
    font-weight: 500;
    font-family: var(--heading-font);
  }
  
  .ip-list { font-family: var(--heading-font); font-size: 0.82rem; }
  .ip-item { display: block; padding: 4px 0; }
  .ip-v4 { color: var(--info-neon); font-weight: 600; }
  .ip-v6 { color: var(--primary-neon); font-weight: 600; }
  .ip-empty { color: var(--text-light); font-style: italic; }

  .field-grid {
    display: grid;
    gap: var(--space-md);
    margin-bottom: var(--space-md);
  }
  
  .field-label {
    display: block;
    margin-bottom: var(--space-xs);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-primary);
    font-family: var(--heading-font);
  }
  
  .text-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 0.95rem;
    color: var(--text-primary);
    background: var(--surface-elevated);
    transition: all var(--transition-normal);
    font-family: var(--body-font);
    font-weight: 400;
  }
  
  .text-input:focus {
    outline: none;
    border-color: var(--primary-neon);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.2), var(--glow-primary);
  }
  
  .text-input:hover {
    border-color: var(--border-light);
  }
  
  .text-input:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  .action-button {
    width: 100%;
    border: none;
    border-radius: var(--radius-md);
    padding: 12px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, var(--primary-neon-alt) 0%, var(--primary-neon) 100%);
    cursor: pointer;
    transition: all var(--transition-normal);
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
    font-family: var(--heading-font);
    border: 1px solid var(--primary-neon);
    box-shadow: var(--glow-primary);
  }
  
  .action-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.5s;
  }
  
  .action-button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: var(--glow-primary), var(--shadow-lg);
    background: linear-gradient(135deg, var(--primary-neon) 0%, var(--accent-neon) 100%);
  }
  
  .action-button:hover:not(:disabled)::before {
    left: 100%;
  }
  
  .action-button:active:not(:disabled) {
    transform: translateY(0);
  }
  
  .action-button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: var(--shadow-sm);
    background: linear-gradient(135deg, var(--border) 0%, var(--border-light) 100%);
    border-color: var(--border);
    box-shadow: none;
  }

.admin-panel {
    margin-top: var(--space-lg);
    padding-top: var(--space-lg);
    border-top: 1px solid var(--border);
    border-color: var(--accent-neon);
    position: relative;
  }
  
  .admin-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent-neon), transparent);
    opacity: 0.8;
  }
  
  .empty-state {
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    font-size: 0.875rem;
    line-height: 1.6;
    text-align: center;
    color: var(--text-muted);
    background: var(--surface-elevated);
    border-color: var(--primary-neon);
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
  }
  
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-top: var(--space-md);
    font-size: 0.875rem;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    padding: var(--space-xs) 0;
  }
  
  .checkbox-row input {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  
  .checkbox-row:hover {
    color: var(--text-primary);
  }
  
  .lang-selector {
    position: fixed;
    top: var(--space-md);
    right: var(--space-md);
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface-elevated);
    color: var(--text-primary);
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
    transition: all var(--transition-normal);
    font-weight: 600;
    font-family: var(--heading-font);
    box-shadow: var(--shadow);
    z-index: 1000;
    border-color: var(--primary-neon);
    box-shadow: var(--glow-primary);
  }
  
  .lang-selector:hover {
    border-color: var(--primary-neon);
    box-shadow: var(--glow-primary);
    transform: translateY(-1px);
  }
  
  .lang-selector:focus {
    border-color: var(--primary-neon);
    box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.3), var(--glow-primary);
  }
  </style>
</head>
<body>
<select id="langSelect" class="lang-selector">
  <option value="en">EN</option>

<h1 id="mainTitle">WLT Traffic Policy</h1>
<div id="status"></div>
<div id="app"><div class="loading">Loading...</div></div>

    resolvedDevice: "見つかったデバイス",

    setRemotePolicy: "接続方法を変更",
    enterPskAndTargetIp: "アクセスパスワードとターゲットIPを入力し、デバイスを検索してその接続とアドレスを確認してください。"

let currentLang = 'en';
let deviceData = null;
let policies = [];
let applying = false;
let adminEnabled = false;
let selfState = {
  flushConntrack: true
};
let adminState = {
  psk: '',
  ip: '',
  lookupIP: '',
  device: null,
  statusMessage: '',
  statusType: 'info',
  loading: false,
  applying: false,
  flushConntrack: true
};

function t(key) {
return translations[currentLang][key] || translations['en'][key];
}

function detectLanguage() {
  const savedLang = localStorage.getItem('wlt-language');
  if (savedLang && translations[savedLang]) {
    currentLang = savedLang;
  } else {
    const browserLang = navigator.language || navigator.userLanguage;
    const langCode = browserLang.toLowerCase();
    
    if (langCode.startsWith('zh')) {
      currentLang = 'zh';
    } else if (langCode.startsWith('ja')) {
      currentLang = 'ja';
    } else {
      currentLang = 'en';
    }
  }
  
  document.getElementById('langSelect').value = currentLang;
  document.getElementById('pageTitle').textContent = t('title');
  document.getElementById('mainTitle').textContent = t('title');
  
  return currentLang;
}

function setLanguage(lang) {
  if (translations[lang]) {
    currentLang = lang;
    localStorage.setItem('wlt-language', lang);
    document.getElementById('langSelect').value = lang;
    render();
  }
}

document.getElementById('langSelect').addEventListener('change', function() {
  setLanguage(this.value);
});

function escapeHtml(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, function (char) {
    return {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char];
  });
}

function renderStatus(message, type, extraClass) {
  if (!message) return '';
  return '<div class="status ' + (type || 'info') + (extraClass ? ' ' + extraClass : '') + '">' + escapeHtml(message) + '</div>';
}

function renderIPList(dev) {
  return [
    ...((dev.ipv4s || []).map(function (ip) { return '<span class="ip-item ip-v4">' + escapeHtml(ip) + '</span>'; })),
    ...((dev.ipv6s || []).map(function (ip) { return '<span class="ip-item ip-v6">' + escapeHtml(ip) + '</span>'; }))
  ].join('') || '<span class="ip-item ip-empty">' + t('none') + '</span>';
}

function renderPolicyCards(currentPolicy, handlerName, disabled) {
  return policies.map(function (policy) {
    const active = policy.name === currentPolicy ? 'active' : '';
    const locked = disabled ? 'disabled' : '';
    const clickHandler = disabled ? '' : "onclick='" + handlerName + '(' + JSON.stringify(policy.name) + ")'";
    return `
      <div class="policy-card ${active} ${locked}" ${clickHandler}>
        <div class="policy-dot"></div>
        <div class="policy-info">
          <div class="policy-name">${escapeHtml(policy.name)}</div>
          <div class="policy-desc">${escapeHtml(policy.description || '')}</div>
        </div>
        <div class="policy-mark">mark ${escapeHtml(policy.mark)}</div>
      </div>
    `;
  }).join('');
}

async function readJSON(res) {
  try {
    return await res.json();
  } catch (_) {
    return null;
  }
}

async function load() {
  try {
    const [devRes, polRes, featureRes] = await Promise.all([
      fetch('/api/device'),
      fetch('/api/policies'),
      fetch('/api/features')
    ]);
    if (!devRes.ok) throw new Error(t('failedLoadDeviceInfo'));
    if (!polRes.ok) throw new Error(t('failedLoadPolicies'));
    if (!featureRes.ok) throw new Error(t('failedLoadFeatures'));
    deviceData = await devRes.json();
    policies = await polRes.json();
    const features = await featureRes.json();
    adminEnabled = !!features.admin_enabled;
    
    // Update policy descriptions to be user-friendly
    policies = policies.map(policy => {
      if (policy.name === 'direct') {
        return { ...policy, description: 'Standard connection - goes straight to the internet' };
      } else if (policy.name === 'proxy') {
        return { ...policy, description: 'Goes through a proxy server' };
      } else if (policy.name === 'vpn') {
        return { ...policy, description: 'Routes through VPN for privacy' };
      }
      return policy;
    });
    
    render();
  } catch (e) {
    showStatus(t('error') + e.message, 'err');
    document.getElementById('app').innerHTML = '';
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + (type || 'info');
  el.textContent = msg;
  if (type === 'ok') {
    setTimeout(function () {
      el.textContent = '';
      el.className = '';
    }, 3000);
  }
}

function render() {
  const dev = deviceData;
  const app = document.getElementById('app');
  
  // Update main title when language changes
  document.getElementById('mainTitle').textContent = t('title');
  
  if (!dev) {
    app.innerHTML = `<div class="loading">${t('loading')}</div>`;
    return;
  }
  
  const selfPolicyCards = renderPolicyCards(dev.policy, 'setPolicy', applying);
    const adminPolicyCards = adminState.device
      ? renderPolicyCards(adminState.device.policy, 'setAdminPolicy', adminState.loading || adminState.applying)
      : '';

    const adminPanel = !adminEnabled ? `
      <div class="empty-state">
        ${t('adminManagementDisabled')}
      </div>
    ` : adminState.device ? `
      <div class="admin-panel">
        <h2>${t('resolvedDevice')}</h2>
        <div class="info-row">
          <span class="info-label">${t('lookupIp')}</span>
          <span class="info-value">${escapeHtml(adminState.lookupIP || '-')}</span>
        </div>
        <div class="info-row">
          <span class="info-label">${t('sourceIp')}</span>
          <span class="info-value">${escapeHtml(adminState.device.source_ip || '-')}</span>
        </div>
        <div class="info-row">
          <span class="info-label">${t('macAddress')}</span>
          <span class="info-value">${escapeHtml(adminState.device.mac || t('unknown'))}</span>
        </div>
        <div class="info-row">
          <span class="info-label">${t('allAddresses')}</span>
          <span class="info-value"><span class="ip-list">${renderIPList(adminState.device)}</span></span>
        </div>
        <div class="info-row">
          <span class="info-label">${t('currentPolicy')}</span>
          <span class="info-value" style="font-weight:600;color:var(--primary)">${escapeHtml(adminState.device.policy || '-')}</span>
        </div>
        <h2 style="margin-top:var(--space-lg)">${t('setRemotePolicy')}</h2>
        <div class="policy-grid">${adminPolicyCards}</div>
        <label class="checkbox-row">
          <input type="checkbox" ${adminState.flushConntrack ? 'checked' : ''} onchange="adminState.flushConntrack=this.checked">
          ${t('interruptConnections')}
        </label>
      </div>
    ` : `
      <div class="empty-state">
        ${t('enterPskAndTargetIp')}
      </div>
    `;

    app.innerHTML = `
      <div class="card">
        <div class="card-tag self">${t('myDevice')}</div>
        <div class="card-title">${t('manageThisDevice')}</div>
        <div class="card-copy">${t('myDeviceDescription')}</div>
        <h2>${t('deviceInfo')}</h2>
        <div class="info-row">
          <span class="info-label">${t('sourceIp')}</span>
          <span class="info-value">${escapeHtml(dev.source_ip || '-')}</span>
        </div>
        <div class="info-row">
          <span class="info-label">${t('macAddress')}</span>
          <span class="info-value">${escapeHtml(dev.mac || t('unknown'))}</span>
        </div>
        <div class="info-row">
          <span class="info-label">${t('allAddresses')}</span>
          <span class="info-value"><span class="ip-list">${renderIPList(dev)}</span></span>
        </div>
        <div class="info-row">
          <span class="info-label">${t('currentPolicy')}</span>
          <span class="info-value" style="font-weight:600;color:var(--primary)">${escapeHtml(dev.policy || '-')}</span>
        </div>
      </div>
      <div class="card">
        <h2>${t('selectPolicy')}</h2>
        <div class="policy-grid">${selfPolicyCards}</div>
        <label class="checkbox-row">
          <input type="checkbox" id="flushCt" ${selfState.flushConntrack ? 'checked' : ''} onchange="selfState.flushConntrack=this.checked">
          ${t('interruptConnections')}
        </label>
      </div>
      <div class="card admin-card">
        <div class="card-tag admin">Administrator</div>
        <div class="card-title">${t('manageAnotherDevice')}</div>
        <div class="card-copy">${t('adminDescription')}</div>
        ${renderStatus(adminState.statusMessage, adminState.statusType, 'inline-status')}
        <div class="field-grid">
          <label>
            <span class="field-label">${t('preSharedKey')}</span>
            <input
              class="text-input"
              type="password"
              autocomplete="new-password"
              placeholder="${t('enterPskPlaceholder')}"
              value="${escapeHtml(adminState.psk)}"
              ${adminEnabled ? '' : 'disabled'}
              oninput="adminState.psk=this.value"
            >
          </label>
          <label>
            <span class="field-label">${t('targetIp')}</span>
            <input
              class="text-input"
              type="text"
              inputmode="text"
              spellcheck="false"
              placeholder="${t('ipPlaceholder')}"
              value="${escapeHtml(adminState.ip)}"
              ${adminEnabled ? '' : 'disabled'}
              oninput="adminState.ip=this.value"
            >
          </label>
        </div>
        <button class="action-button" onclick="lookupAdminDevice()" ${!adminEnabled || adminState.loading || adminState.applying ? 'disabled' : ''}>
          ${adminState.loading ? t('resolvingDevice') : t('resolveDevice')}
        </button>
        ${adminPanel}
      </div>
    `;
}

async function setPolicy(name) {
  if (applying) return;
  if (deviceData && deviceData.policy === name) return;
  applying = true;
  showStatus(t('applyPolicy') + name + '...', 'info');
  render();
  try {
    const res = await fetch('/api/policy', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({policy: name, flush_conntrack: selfState.flushConntrack})
    });
    const data = await readJSON(res);
    if (!res.ok) throw new Error((data && data.error) || 'Failed');
    deviceData = data;
    render();
    showStatus(t('policySetTo') + name, 'ok');
  } catch (e) {
    render();
    showStatus(t('error') + e.message, 'err');
  } finally {
    applying = false;
    render();
  }
}

async function lookupAdminDevice() {
  if (adminState.loading || adminState.applying) return;
  if (!adminEnabled) {
    adminState.statusMessage = t('adminManagementDisabled');
    adminState.statusType = 'err';
    render();
    return;
  }

  const psk = adminState.psk.trim();
  const ip = adminState.ip.trim();

  if (!psk) {
    adminState.statusMessage = t('enterPsk');
    adminState.statusType = 'err';
    render();
    return;
  }

  if (!ip) {
    adminState.statusMessage = t('enterTargetIp');
    adminState.statusType = 'err';
    render();
    return;
  }

  adminState.loading = true;
  adminState.lookupIP = '';
  adminState.device = null;
  adminState.statusMessage = t('resolveDeviceStarted') + ip + '...';
  adminState.statusType = 'info';
  render();

  try {
    const res = await fetch('/api/admin/device?ip=' + encodeURIComponent(ip), {
      headers: {'X-WLT-PSK': psk}
    });
    const data = await readJSON(res);
    if (!res.ok) throw new Error((data && data.error) || 'Failed to resolve device');
    adminState.lookupIP = ip;
    adminState.device = data;
    adminState.statusMessage = t('deviceResolved') + ip;
    adminState.statusType = 'ok';
  } catch (e) {
    adminState.statusMessage = t('error') + e.message;
    adminState.statusType = 'err';
  } finally {
    adminState.loading = false;
    render();
  }
}

async function setAdminPolicy(name) {
  if (adminState.loading || adminState.applying) return;
  if (!adminEnabled) {
    adminState.statusMessage = t('adminManagementDisabled');
    adminState.statusType = 'err';
    render();
    return;
  }
  const psk = adminState.psk.trim();
  if (!adminState.lookupIP || !adminState.device) {
    adminState.statusMessage = t('resolveFirstDevice');
    adminState.statusType = 'err';
    render();
    return;
  }
  if (!psk) {
    adminState.statusMessage = t('enterPskForAdmin');
    adminState.statusType = 'err';
    render();
    return;
  }
  if (adminState.device.policy === name) return;

  adminState.applying = true;
  adminState.statusMessage = t('applyRemotePolicy') + name + '...';
  adminState.statusType = 'info';
  render();

  try {
    const res = await fetch('/api/admin/policy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-WLT-PSK': psk
      },
      body: JSON.stringify({
        policy: name,
        ip: adminState.lookupIP,
        flush_conntrack: adminState.flushConntrack
      })
    });
    const data = await readJSON(res);
    if (!res.ok) throw new Error((data && data.error) || 'Failed');
    adminState.device = data;
    adminState.statusMessage = t('remotePolicySetTo') + name;
    adminState.statusType = 'ok';
  } catch (e) {
    adminState.statusMessage = t('error') + e.message;
    adminState.statusType = 'err';
  } finally {
    adminState.applying = false;
    render();
  }
}

detectLanguage();
load();
</script>
</body>
</html>
